name: Deploy to ECR (multi-arch)

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.event.release.tag_name || github.sha }}
  cancel-in-progress: false

env:
  IMAGE_NAME: language_model_gateway
  REPOSITORY_URL: 856965016623.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-amd64:
    runs-on: main
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build AMD64 image (no push) and export as tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          target: production
          push: false
          secrets: |
            "jfrog_user=${{ secrets.JFROG_READ_USER }}"
            "jfrog_token=${{ secrets.JFROG_READ_TOKEN }}"
          tags: |
            ${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}-amd64
          outputs: type=docker,dest=/tmp/amd64-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload AMD64 image artifact
        uses: actions/upload-artifact@v6
        with:
          name: amd64-image-${{ steps.vars.outputs.tag }}
          path: /tmp/amd64-image.tar
          if-no-files-found: error

  build-arm64:
    runs-on: main-arm
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ARM64 image (no push) and export as tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          target: production
          push: false
          secrets: |
            "jfrog_user=${{ secrets.JFROG_READ_USER }}"
            "jfrog_token=${{ secrets.JFROG_READ_TOKEN }}"
          tags: |
            ${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}-arm64
          outputs: type=docker,dest=/tmp/arm64-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload ARM64 image artifact
        uses: actions/upload-artifact@v6
        with:
          name: arm64-image-${{ steps.vars.outputs.tag }}
          path: /tmp/arm64-image.tar
          if-no-files-found: error

  publish-amd64:
    needs: [build-amd64]
    runs-on: main
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: vars
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download AMD64 image artifact
        uses: actions/download-artifact@v7
        with:
          name: amd64-image-${{ steps.vars.outputs.tag }}
          path: /tmp

      - name: Load AMD64 image and push to ECR
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker load -i /tmp/amd64-image.tar
          docker push ${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${TAG}-amd64

  publish-arm64:
    needs: [build-arm64]
    runs-on: main
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: vars
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download ARM64 image artifact
        uses: actions/download-artifact@v7
        with:
          name: arm64-image-${{ steps.vars.outputs.tag }}
          path: /tmp

      - name: Load ARM64 image and push to ECR
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker load -i /tmp/arm64-image.tar
          docker push ${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${TAG}-arm64

  manifest:
    needs: [publish-amd64, publish-arm64]
    runs-on: main
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute manifest tag
        id: vars
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push multi-arch manifest (release tag)
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker buildx imagetools create \
            -t ${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${TAG} \
            ${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            ${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${TAG}-arm64
